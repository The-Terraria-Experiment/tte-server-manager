version: 1
applications:
  - appRoot: src/tte-server-manager
    backend:
      phases:
        build:
          commands:
            - npm ci --cache .npm --prefer-offline
            - |
              if [ "$AWS_BRANCH" = "stage" ]; then
                ENV_BRANCH="main"
              else
                ENV_BRANCH="$AWS_BRANCH"
              fi
              npx ampx pipeline-deploy --branch $ENV_BRANCH --app-id $AWS_APP_ID
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci --cache .npm --prefer-offline
            - |
              if [ "$AWS_BRANCH" = "stage" ]; then
                ENV_BRANCH="main"
              else
                ENV_BRANCH="$AWS_BRANCH"
              fi
              npx ampx generate outputs --branch $ENV_BRANCH --app-id $AWS_APP_ID
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - .npm/**/*
          - node_modules/**/*
