schemaVersion: "2.2"
description: "Build JSON file tree for a given root path (base64)"
parameters:
  RootPathB64:
    type: String
    description: "Base64-encoded POSIX root path"
  IgnoreDirNames:
    type: String
    description: "Comma-separated directory names to skip (exact name match)"
    default: ""
  AcceptExtensions:
    type: String
    description: "Comma-separated file extensions to include (case-insensitive). Empty = include all"
    default: ""
mainSteps:
  - action: "aws:runShellScript"
    name: "buildFileTree"
    inputs:
      runCommand:
        - "set -e"
        - 'python3 - <<''PY'''
        - "import base64"
        - "import datetime"
        - "import json"
        - "import os"
        - "import sys"
        - ""
        - "root_b64 = os.environ.get('ROOT_B64', '')"
        - "if not root_b64:"
        - "    print(json.dumps({'error': 'ROOT_B64 missing'}))"
        - "    sys.exit(1)"
        - ""
        - "try:"
        - "    root_path = base64.b64decode(root_b64).decode('utf-8')"
        - "except Exception:"
        - "    print(json.dumps({'error': 'Failed to decode root path'}))"
        - "    sys.exit(1)"
        - ""
        - "root_path = root_path.rstrip('/') or '/'"
        - "if not os.path.isdir(root_path):"
        - "    print(json.dumps({'error': 'Root path does not exist', 'path': root_path}))"
        - "    sys.exit(1)"
        - ""
        - "ignore_dirs = [d.strip() for d in os.environ.get('IGNORE_DIRS', '').split(',') if d.strip()]"
        - "accept_exts = [e.strip().lower() for e in os.environ.get('ACCEPT_EXTS', '').split(',') if e.strip()]"
        - ""
        - "def iso_mtime(ts):"
        - "    return datetime.datetime.utcfromtimestamp(ts).isoformat() + 'Z'"
        - ""
        - "def should_include_file(name):"
        - "    if not accept_exts:"
        - "        return True"
        - "    lower = name.lower()"
        - "    return any(lower.endswith(ext) for ext in accept_exts)"
        - ""
        - "def build_tree(current_path, root_path):"
        - "    items = []"
        - "    try:"
        - "        with os.scandir(current_path) as it:"
        - "            for entry in it:"
        - "                try:"
        - "                    is_symlink = entry.is_symlink()"
        - "                    is_dir = entry.is_dir(follow_symlinks=False)"
        - "                except OSError:"
        - "                    is_symlink = False"
        - "                    is_dir = False"
        - ""
        - "                if is_dir and entry.name in ignore_dirs:"
        - "                    continue"
        - ""
        - "                if not is_dir and not is_symlink and not should_include_file(entry.name):"
        - "                    continue"
        - ""
        - "                items.append((entry, is_dir, is_symlink))"
        - "    except PermissionError:"
        - "        return []"
        - ""
        - "    items.sort(key=lambda item: (0 if item[1] else 1, item[0].name.lower()))"
        - "    children = []"
        - "    for entry, is_dir, is_symlink in items:"
        - "        rel_path = os.path.relpath(entry.path, root_path)"
        - "        node = {"
        - "            'name': entry.name,"
        - "            'path': '' if rel_path == '.' else rel_path"
        - "        }"
        - "        if is_symlink:"
        - "            node['type'] = 'symlink'"
        - "        elif is_dir:"
        - "            node['type'] = 'dir'"
        - "            node['children'] = build_tree(entry.path, root_path)"
        - "        else:"
        - "            node['type'] = 'file'"
        - "            try:"
        - "                stat = entry.stat(follow_symlinks=False)"
        - "                node['size'] = stat.st_size"
        - "                node['mtime'] = iso_mtime(stat.st_mtime)"
        - "            except OSError:"
        - "                pass"
        - "        children.append(node)"
        - ""
        - "    return children"
        - ""
        - "tree = {"
        - "    'name': os.path.basename(root_path) or root_path,"
        - "    'path': '',"
        - "    'type': 'dir',"
        - "    'children': build_tree(root_path, root_path)"
        - "}"
        - ""
        - "print(json.dumps(tree, ensure_ascii=True))"
        - "PY"
      environment:
        ROOT_B64: "{{ RootPathB64 }}"
        IGNORE_DIRS: "{{ IgnoreDirNames }}"
        ACCEPT_EXTS: "{{ AcceptExtensions }}"