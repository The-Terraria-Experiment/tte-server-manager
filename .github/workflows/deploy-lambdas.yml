name: Deploy Lambdas

on:
  push:
    branches:
      - main
      - stage
    paths:
      - 'src/lambda/**'
      - 'src/shared/types/**'
      - 'tsconfig.json'
      - 'tsconfig.lambda.json'
      - 'package.json'
      - '.github/workflows/deploy-lambdas.yml'

env:
  AWS_REGION: us-east-2

permissions:
  id-token: write   # Required for OIDC authentication with AWS
  contents: read    # Required to checkout the repository

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build Lambda bundles
        run: node src/lambda/build.js

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: lambda-bundles
          path: src/lambda/dist/*.zip
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lambda: [instance-manager, server-manager, user-manager, cognito-user-link, system-manager, api-authorizer]
    steps:
      - uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: lambda-bundles
          path: src/lambda/dist/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_LAMBDA_DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine function name
        id: func-name
        run: |
          # Map branch to alias and base function name (no env suffix)
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            LAMBDA_ALIAS="prod"
          elif [ "${{ github.ref }}" = "refs/heads/stage" ]; then
            LAMBDA_ALIAS="stage"
          else
            LAMBDA_ALIAS="dev"
          fi
          FUNC_NAME="ttesm-${{ matrix.lambda }}"
          echo "name=$FUNC_NAME" >> $GITHUB_OUTPUT
          echo "alias=$LAMBDA_ALIAS" >> $GITHUB_OUTPUT

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name "${{ steps.func-name.outputs.name }}" \
            --zip-file "fileb://src/lambda/dist/${{ matrix.lambda }}.zip"
          echo "✓ Deployed ${{ steps.func-name.outputs.name }}"

      - name: Wait for update
        run: |
          aws lambda wait function-updated \
            --function-name "${{ steps.func-name.outputs.name }}"

      - name: Apply alias-specific env vars
        run: |
          ALIAS="${{ steps.func-name.outputs.alias }}"

          if [ "$ALIAS" = "stage" ]; then
            ACTIVE_ENV_VALUE="stage"
          else
            ACTIVE_ENV_VALUE="prod"
          fi

          CURRENT_VARS=$(aws lambda get-function-configuration \
            --function-name "${{ steps.func-name.outputs.name }}" \
            --query 'Environment.Variables' \
            --output json)

          if [ "$CURRENT_VARS" = "null" ] || [ -z "$CURRENT_VARS" ]; then
            CURRENT_VARS='{}'
          fi

          UPDATED_VARS=$(echo "$CURRENT_VARS" | jq -c --arg env "$ACTIVE_ENV_VALUE" '. + {ACTIVE_ENV: $env}')
          ENV_PAYLOAD=$(jq -cn --argjson vars "$UPDATED_VARS" '{Variables: $vars}')

          aws lambda update-function-configuration \
            --function-name "${{ steps.func-name.outputs.name }}" \
            --environment "$ENV_PAYLOAD"

          aws lambda wait function-updated \
            --function-name "${{ steps.func-name.outputs.name }}"

          echo "✓ Updated ACTIVE_ENV=$ACTIVE_ENV_VALUE for ${{ steps.func-name.outputs.name }}"

      - name: Publish version and update alias
        run: |
          VERSION=$(aws lambda publish-version \
            --function-name "${{ steps.func-name.outputs.name }}" \
            --query 'Version' \
            --output text)
          aws lambda update-alias \
            --function-name "${{ steps.func-name.outputs.name }}" \
            --name "${{ steps.func-name.outputs.alias }}" \
            --function-version "$VERSION" \
            || aws lambda create-alias \
              --function-name "${{ steps.func-name.outputs.name }}" \
              --name "${{ steps.func-name.outputs.alias }}" \
              --function-version "$VERSION"
          echo "✓ Alias ${{ steps.func-name.outputs.alias }} -> $VERSION"
